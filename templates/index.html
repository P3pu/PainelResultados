<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Resultados - Corrida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .upload-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #007bff; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 upload-container">
                <h2 class="text-center mb-4">Processador de Planilhas</h2>
                <form action="/upload" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label"><b>Planilha A:</b> Inscritos (Cadastro)</label>
                        <input type="file" name="file1" class="form-control" required accept=".xlsx, .csv">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><b>Planilha B:</b> Resultados (Prova)</label>
                        <input type="file" name="file2" class="form-control" required accept=".xlsx, .csv">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Processar e Visualizar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
